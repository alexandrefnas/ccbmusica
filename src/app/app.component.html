<div class="container__screen">

  <!-- Overlay -->
  <div
    class="overlay"
    *ngIf="menuMobileAberto"
    (click)="fecharMenuMobile()">
  </div>

  <!-- Menu -->
  <div
    class="container__menu-lateral"
    [class.oculto]="menuOculto"
    [class.mobile-aberto]="menuMobileAberto"
    *ngIf="logado">
    <tcx-menu />
  </div>

  <!-- Conteúdo -->
  <div class="container__router">
    <router-outlet />
  </div>

</div>
</div>
