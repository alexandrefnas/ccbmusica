<div class="container__tela">
  <div id="barra-titulo__container">
    <h2>Painel de Contole</h2>
  </div>

  <div class="tela__container">
    <div class="container__card" *ngFor="let c of dados; let i = index">
      <div class="card-titulo">
        <div class="componente-titulo">
          <p>{{dados[i].nome}}</p>
        </div>
        <div class="componente-titulo-total">
          <p>{{dados[i].total}}</p>
        </div>
      </div>
      <div class="card-value">
        <div class="componente-value" *ngFor="let v of dados[i].detalhamento ">
          <div class="componente-value-title">
            {{v.label | slice:0:6}}.
          </div>
          <div class="componente-value-status">
            <div class="status-result"><p>AP</p> <p>{{v.aprovado}}</p></div>
            <div class="status-result"><p>RP</p><P>{{v.reprovado}}</P></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
