<div class="container__tela">
  <div id="tela__barra-menu">
    <div id="barra-titulo__container">
      <h2 style="font-weight: normal; color: grey">USUÁRIOS</h2>
    </div>
    <div>
      <button class="buttons" (click)="buttonClick()">
        <i class="bi bi-file-earmark-plus"></i> Novo Usuário
      </button>
    </div>
  </div>
  <div id="tela__container-tabela" *ngIf="!liberacoes">
    <tcx-table
    [colunas]="camposColunas"
    [colunasLabels]="tituloColunas"
    [dados]="listaUsuarios"
    [tamanhosColunas]="tamanhoColunas"
    [alinhamentosColunasTitulo]="alinhamentoColunaTitulo"
    [alinhamentosColunas]="alinhamentoColuna"
      [mostrarAcoes]="true"
      [acoesTabela]="acoes"
    />
  </div>
  <div id="tela__container-tabela" *ngIf="liberacoes">
<form [formGroup]="dadosForms" class="acessos-container">
  <div formGroupName="acessos">

    <div
      class="modulo"
      *ngFor="let modulo of modulos"
      [formGroupName]="modulo"
    >
      <div class="modulo-nome">
        {{ modulo | titlecase }}
      </div>

      <div class="permissoes">

        <!-- READ -->
        <label class="switch">
          <input type="checkbox" formControlName="read" />
          <span class="slider"></span>
          <span class="label">Ler</span>
        </label>

        <!-- CREATE -->
        <label class="switch">
          <input type="checkbox" formControlName="create" />
          <span class="slider"></span>
          <span class="label">Criar</span>
        </label>

        <!-- UPDATE -->
        <label class="switch">
          <input type="checkbox" formControlName="update" />
          <span class="slider"></span>
          <span class="label">Editar</span>
        </label>

        <!-- DELETE -->
        <label class="switch">
          <input type="checkbox" formControlName="delete" />
          <span class="slider"></span>
          <span class="label">Excluir</span>
        </label>

      </div>
    </div>

  </div>
</form>
  </div>
</div>

<tcx-modal [title]="title" [visible]="mostrarModal" (onClose)="fecharModal()">
  <div class="templates__form">
    <form [formGroup]="dadosForms" (ngSubmit)="prepararDados()">
      <div class="linha1">
        <div class="input-text" id="input-nome">
          <tcx-text
            label="Nome Completo"
            type="name"
            formControlName="nome"
            [required]="true"
            errorMessage="Campo obrigatório"
          />
        </div>
      </div>
      <div class="linha2">
        <div class="input-text" id="input-email">
          <tcx-text
            label="Email"
            type="email"
            formControlName="email"
            [required]="true"
            errorMessage="Campo obrigatório"
          />
        </div>
      </div>
      <div class="linha3">
        <div class="input-text" id="input-senha">
          <tcx-text
            label="Senha"
            type="password"
            formControlName="senha"
            [required]="true"
            errorMessage="Campo obrigatório"
          />
        </div>
      </div>
      <div class="linha4">
        <div class="input-select">
          <tcx-select
            [label]="'Perfil'"
            [placeholder]="''"
            [niveisLimitados]="listaTipoUsuario"
            [formControl]="getControl('perfil')"
            [required]="true"
            errorMessage="Campo obrigatório"
          />
        </div>
      </div>
      <div class="linhaButton">
        <div class="form__button" *ngIf="permissao">
          <tcx-button label="Salvar" type="submit"></tcx-button>
        </div>
      </div>
    </form>
  </div>
</tcx-modal>
